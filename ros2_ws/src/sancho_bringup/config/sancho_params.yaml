camera_node:
  ros__parameters:
    camera_index: 0
    frame_width: 640
    frame_height: 480
    publish_rate_hz: 30.0
    hsv_lower: [16, 0, 58]      # on-rover calibration via tools/calibrate_hsv_web.py
    hsv_upper: [33, 255, 255]
    roi_height_percent: 0.60
    num_roi_strips: 3           # horizontal slices for multi-point line fit
    min_contour_area: 500       # px; blobs smaller than this are ignored
    morph_kernel_size: 5        # erosion/dilation kernel; increase on noisy images
    ema_alpha: 0.3              # EMA weight on new sample (0=frozen, 1=no smoothing)
    lost_trail_patience: 5      # frames to coast before publishing NaN
    show_debug: true

controller_node:
  ros__parameters:
    motor_rpm: 300.0           # used to compute v_max (must match motor_bridge_node)
    wheel_diameter: 0.09       # used to compute v_max (must match motor_bridge_node)
    pid_kp: 1.2                # PID on lateral trail error
    pid_ki: 0.0
    pid_kd: 0.1                # mild damping at higher speeds
    slowdown_threshold: 0.7    # |err| above which speed is reduced
    slow_speed_ratio: 0.5      # fraction of max_speed used when above threshold
    trail_lost_timeout: 2.0    # seconds of NaN/silence before TRAIL_LOST
    obstacle_distance_m: 0.3   # meters; below this => OBSTACLE_STOP (needs sensor_node)
    control_rate_hz: 20.0      # Twist publish rate; also the PID dt
    max_angular_z: 2.0         # rad/s clamp on PID output

motor_bridge_node:
  ros__parameters:
    # 4WD skid-steer: 2 motors per side (JGB37-545 rear, JGB37-520 front).
    # Per-motor PWM scaling to match output speeds is handled in MCU firmware,
    # not here — ROS sees a logical "left side" and "right side" only.
    wheel_separation: 0.58     # m, *effective* separation for 4WD skid-steer (physical is 0.265; inflated further to amplify steering on the test terrain)
    wheel_diameter:   0.09     # m, driven wheel diameter (4WD chassis)
    motor_rpm:        300.0    # nominal output RPM of the slowest motor (545); v_max ≈ 1.41 m/s
    max_pwm:          255      # BTS7960 is 8-bit PWM
    deadband_pwm:     0        # TODO: tune on bench (5 kg chassis)
    invert_left:      false    # TODO: flip if left side runs backward on first test
    invert_right:     false    # TODO: flip if right side runs backward on first test
    left_scale:       1.0      # TODO: calibrate if left/right are asymmetric
    right_scale:      1.0
    watchdog_timeout: 0.5      # s; stop motors if no /cmd_vel for this long
    watchdog_rate_hz: 20.0
    udp_target_host: rover4motori-main-1  # App Lab container hostname; container name is <appname>-main-1
    udp_target_port: 9001
    dry_run: false             # set true to skip UDP send (kinematics-only test)

sensor_node:
  ros__parameters:
    udp_listen_host: 0.0.0.0
    udp_listen_port: 9002       # App Lab Python shim sends HC-SR04 readings here
    frame_id: ultrasonic_front
    field_of_view_rad: 0.26     # ~15° HC-SR04 cone
    min_range_m: 0.02
    max_range_m: 4.0
